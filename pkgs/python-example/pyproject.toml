[project]
name = "python_example"
version = "0.0.1"
description = "Example Python ROS2 package"
requires-python = ">=3.8"
dependencies = [
    "rclpy",
]

[project.optional-dependencies]
dev = [
    "pytest",
]

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["python_example"]