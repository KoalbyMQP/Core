name: Build Package Images

on:
  push:
    branches:
      - main
    paths:
      - "pkgs/**"
      - ".github/workflows/build-packages.yml"
      - "scripts/ci/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Discover package matrix
        id: packages
        run: |
          MATRIX="$(python3 scripts/ci/discover_packages.py)"
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Discovered packages: ${MATRIX}"

  build:
    needs: discover
    if: ${{ needs.discover.outputs.packages != '[]' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.discover.outputs.packages) }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.package.image_name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push ${{ matrix.package.package_dir }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.package.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          push: true
          build-args: |
            PACKAGE_NAME=${{ matrix.package.package_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.package.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.package.image_name }}
