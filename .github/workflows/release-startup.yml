name: Release Startup

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  PACKAGE_NAME: face_ui
  PACKAGE_DIR: startup
  REGISTRY: ghcr.io
  IMAGE_NAME: koalbymqp/zaraos-startup

jobs:
  # ── Job 1: Build & Test (maps to Jenkins stages 1-4) ──────────────────
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install uv build pytest

      - name: Install dependencies
        run: |
          cd pkgs/${{ env.PACKAGE_DIR }}
          uv venv
          . .venv/bin/activate
          uv pip install -e .

      - name: Build
        run: |
          cd pkgs/${{ env.PACKAGE_DIR }}
          . .venv/bin/activate
          pip install .

      - name: Test
        run: |
          cd pkgs/${{ env.PACKAGE_DIR }}
          . .venv/bin/activate
          python -m pytest src/ --ignore=src/test_desktop.py || echo "No tests found"

  # ── Job 2: Release artifacts + GitHub Release (maps to Jenkins stages 5-9) ─
  release:
    needs: build-and-test
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build uv

      # Stage 5 — Build Python Wheel
      - name: Build Python Wheel
        run: |
          cd pkgs/${{ env.PACKAGE_DIR }}
          python3 -m build
          mkdir -p ${{ github.workspace }}/artifacts
          cp dist/*.whl ${{ github.workspace }}/artifacts/
          cp dist/*.tar.gz ${{ github.workspace }}/artifacts/ || true

      # Stage 6 — Build with uv
      - name: Build with uv
        run: |
          cd pkgs/${{ env.PACKAGE_DIR }}
          uv venv .venv-build
          . .venv-build/bin/activate
          uv pip install build
          python3 -m build

      # Stage 7 — Create Tarball
      - name: Create Tarball
        run: |
          mkdir -p ${{ github.workspace }}/artifacts
          tar czf ${{ github.workspace }}/artifacts/${{ env.PACKAGE_NAME }}-${{ github.ref_name }}.tar.gz \
            -C pkgs ${{ env.PACKAGE_DIR }}/

      # Stage 8 — Archive Artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/*

      # Stage 9 — Publish GitHub Release
      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' pkgs/${{ env.PACKAGE_DIR }}/pyproject.toml | cut -d'"' -f2)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Startup ${{ github.ref_name }}"
          body: |
            ## Startup ${{ github.ref_name }}

            Build from commit ${{ github.sha }}

            ### Artifacts
            - Python wheel (.whl)
            - Source distribution (.tar.gz)
            - Source tarball
          files: |
            artifacts/${{ env.PACKAGE_NAME }}-${{ steps.version.outputs.version }}-py3-none-any.whl
            artifacts/${{ env.PACKAGE_NAME }}-${{ steps.version.outputs.version }}.tar.gz
            artifacts/${{ env.PACKAGE_NAME }}-${{ github.ref_name }}.tar.gz

  # ── Job 3: Docker image → GHCR (maps to Jenkins stage 10) ─────────────
  docker:
    needs: build-and-test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: pkgs/${{ env.PACKAGE_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
